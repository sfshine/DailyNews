name: Daily technology intelligence

on:
  schedule:
    # 06:30 UTC every day. For China Standard Time 06:30, use: 30 22 * * *
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate daily report
        run: python3 scripts/generate_daily_report.py

      - name: Commit report
        run: |
          git config user.name "daily-news-bot"
          git config user.email "daily-news-bot@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: add daily intelligence report"
            git push
          fi
